<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ninz Icônes</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@simonwep/pickr@1.8.0/dist/themes/monolith.min.css"
    />
  </head>
  <body>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-icon">✦</span>
          <span class="brand-name">Ninz Icônes</span>
        </div>

        <nav class="style-tabs">
          <button class="tab active" data-style="bold">
            <span class="tab-dot"></span> Bold
          </button>
          <button class="tab" data-style="bold-duotone">
            <span class="tab-dot"></span> Bold Duotone
          </button>
          <button class="tab" data-style="broken">
            <span class="tab-dot"></span> Broken
          </button>
          <button class="tab" data-style="duotone">
            <span class="tab-dot"></span> Duotone
          </button>
          <button class="tab" data-style="linear">
            <span class="tab-dot"></span> Linear
          </button>
          <button class="tab" data-style="outline">
            <span class="tab-dot"></span> Outline
          </button>
        </nav>

        <div class="pkg-section">
          <div class="pkg-label">NPM</div>
          <div class="pkg-buttons">
            <button class="pkg-btn" data-pkg="npm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
              >
                <!-- Icon from Material Design Icons by Pictogrammers - https://github.com/Templarian/MaterialDesign/blob/master/LICENSE -->
                <path d="M20 4H4v16h8V8h4v12h4V4" fill="currentColor" />
              </svg>
              <span>npm</span>
            </button>
            <button class="pkg-btn" data-pkg="yarn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="29.82"
                height="32"
                viewBox="0 0 477 512"
              >
                <!-- Icon from File Icons by John Gardner - https://github.com/file-icons/icons/blob/master/LICENSE.md -->
                <path
                  fill="currentColor"
                  d="M201.875 54.078S223.312-11.056 243.1 1.641c6.101 3.958 28.032 52.767 28.032 52.767s23.416-13.686 26.054-8.575c30.535 93.073 2.41 158.697-37.926 211.067c53.649 50.098 62.982 101.431 52.602 166.38c50.47.108 76.45-49.081 140.82-52.107c28.857-.495 30.341 33.309 8.575 38.585c-44.75 6.317-88.88 56.237-179.077 81.624c-11.635 17.708-81.148 15.728-135.874 20.612c-57.902.615-42.944-44.48-22.096-52.107c-13.596-7.408-14.15-14.796-16.819-14.016c-14.48 77.126-53.98 53.626-78.16 46.995c-18.634-9.894 1.319-33.144 1.319-33.144c-18.14 7.776-32.457-26.504-30.341-60.187c1.979-26.878 31.99-52.932 31.99-52.932c-1.789-67.104 17.813-110.758 69.915-147.417C83.91 177.75 62.91 143.25 90.606 103.06C126.66 93 133.66 50.25 201.876 54.078"
                />
              </svg>
              <span>yarn</span>
            </button>
            <button class="pkg-btn" data-pkg="pnpm">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                viewBox="0 0 24 24"
              >
                <!-- Icon from Lineicons by Lineicons - https://github.com/LineiconsHQ/Lineicons/blob/main/LICENSE.md -->
                <path
                  fill="currentColor"
                  d="M21 8.626h-5.625V3H21zm-6.188 0H9.187V3h5.625zm-6.187 0H3V3h5.625zM21 14.813h-5.625V9.188H21zm-6.188 0H9.187V9.188h5.625zm0 6.187H9.187v-5.625h5.625zM21 21h-5.625v-5.625H21zM8.625 21H3v-5.625h5.625z"
                />
              </svg>
              <span>pnpm</span>
            </button>
          </div>
        </div>

        <div class="cdn-section">
          <div class="cdn-label">CDN</div>
          <div class="cdn-row">
            <input
              type="text"
              class="cdn-input"
              id="cdn-link"
              readonly
              value='&lt;link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ShakilAnsary9/ninz-icones@v1.3.0/cdn/CSS/ninz-icons.css" /&gt;'
            />
            <!-- <a
              href="https://github.com/ShakilAnsary9/ninz-icones"
              target="_blank"
              class="github-link"
              title="View on GitHub"
            >
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
                />
              </svg>
            </a> -->
            <button class="cdn-copy-btn" id="cdn-copy-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="webcomponent-section">
          <div class="cdn-label">Web Component</div>
          <div class="cdn-row">
            <input
              type="text"
              class="cdn-input"
              id="wc-link"
              readonly
              value='&lt;script src="https://cdn.jsdelivr.net/gh/ShakilAnsary9/ninz-icones@v1.3.0/cdn/JS/ninz-icon.js"&gt;&lt;/script&gt;'
            />
            <button class="cdn-copy-btn" id="wc-copy-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                />
              </svg>
            </button>
          </div>
          <!-- <div class="wc-example">
            <code>&lt;ninz-icon name="alarm" variant="outline"&gt;</code>
          </div> -->
        </div>

        <div class="sidebar-footer">
          <div class="icon-count" id="icon-count">— icons</div>
          <div class="credits">
            Icon pack by
            <a
              href="https://github.com/480-Design"
              target="_blank"
              rel="noopener"
              >480 Design</a
            >
          </div>
        </div>
      </aside>

      <!-- Main -->
      <main class="main">
        <!-- Top bar -->
        <header class="topbar">
          <div class="search-wrap">
            <svg
              class="search-icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="7" />
              <path d="M21 21l-4.35-4.35" />
            </svg>
            <input
              id="search"
              type="text"
              placeholder="Search icons…"
              autocomplete="off"
              spellcheck="false"
            />
            <kbd class="search-kbd" id="search-clear" style="display: none"
              >✕</kbd
            >
          </div>

          <div class="topbar-right">
            <a href="./cdn/docs.html" class="docs-icon-link" title="Docs">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                <path
                  d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
                />
              </svg>
            </a>
            <a
              href="https://github.com/ShakilAnsary9/ninz-icones"
              target="_blank"
              class="github-icon-link"
              title="View on GitHub"
            >
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
                />
              </svg>
            </a>
            <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
              <svg
                class="icon-sun"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5" />
                <path
                  d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                />
              </svg>
              <svg
                class="icon-moon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </button>
            <span class="badge" id="showing-count"></span>
          </div>
        </header>

        <!-- Grid -->
        <div class="grid-wrap">
          <div class="grid" id="grid"></div>
          <div class="empty" id="empty" style="display: none">
            <div class="empty-icon">◌</div>
            <div class="empty-text">No icons found</div>
            <div class="empty-sub">Try a different keyword</div>
          </div>
        </div>

        <!-- Load more -->
        <div class="footer">
          <button id="load-more" style="display: none">Load more</button>
        </div>
      </main>
    </div>

    <!-- Package Modal -->
    <div class="pkg-modal" id="pkg-modal">
      <div class="pkg-modal-backdrop"></div>
      <div class="pkg-modal-content">
        <div class="pkg-modal-header">
          <h3 id="pkg-modal-title">Install Package</h3>
          <button class="pkg-modal-close" id="pkg-modal-close">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="pkg-modal-body">
          <div class="pkg-code-row">
            <code class="pkg-code" id="pkg-code"></code>
            <button class="pkg-copy-btn" id="pkg-copy-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip"></div>

    <!-- Icon Modal -->
    <div class="modal" id="icon-modal">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <div class="modal-icon-preview"></div>
          <button class="modal-close" id="modal-close">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="modal-actions">
          <button
            class="modal-btn"
            onclick="handleModalAction('copy-svg', this)"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
              />
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
            </svg>
            <span>SVG Code</span>
          </button>
          <button class="modal-btn" onclick="openColorPickerModal()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>PNG Download</span>
          </button>
          <button
            class="modal-btn"
            onclick="handleModalAction('copy-cdn', this)"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
              />
              <path
                d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
              />
            </svg>
            <span>CDN Tag</span>
          </button>
          <button
            class="modal-btn"
            onclick="handleModalAction('copy-webcomponent', this)"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="16 18 22 12 16 6" />
              <polyline points="8 6 2 12 8 18" />
            </svg>
            <span>Web Component</span>
          </button>
          <button
            class="modal-btn"
            onclick="handleModalAction('copy-jsx', this)"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 17l6-6-6-6" />
              <path d="M12 17h8" />
            </svg>
            <span>JSX</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Color Picker Modal -->
    <div class="color-modal" id="color-modal">
      <div class="color-modal-backdrop"></div>
      <div class="color-modal-content">
        <div class="color-modal-header">
          <h3>Download PNG</h3>
          <button class="color-modal-close" id="color-modal-close">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="color-modal-body">
          <div class="color-preview-large">
            <img id="color-picker-preview" src="" alt="Preview" />
          </div>
          <div class="color-picker-section-new">
            <label class="picker-label">Choose Color</label>
            <div class="picker-wrap">
              <input
                type="color"
                id="png-color-input"
                value="#000000"
                class="native-color-input"
              />
              <span class="color-hex" id="png-color-hex">#000000</span>
            </div>
            <div class="preset-colors">
              <button
                class="preset-btn"
                style="background: #000000"
                data-color="#000000"
              ></button>
              <button
                class="preset-btn"
                style="background: #ffffff"
                data-color="#ffffff"
              ></button>
              <button
                class="preset-btn"
                style="background: #ff0000"
                data-color="#ff0000"
              ></button>
              <button
                class="preset-btn"
                style="background: #00ff00"
                data-color="#00ff00"
              ></button>
              <button
                class="preset-btn"
                style="background: #0000ff"
                data-color="#0000ff"
              ></button>
              <button
                class="preset-btn"
                style="background: #ffff00"
                data-color="#ffff00"
              ></button>
              <button
                class="preset-btn"
                style="background: #ff00ff"
                data-color="#ff00ff"
              ></button>
              <button
                class="preset-btn"
                style="background: #00ffff"
                data-color="#00ffff"
              ></button>
              <button
                class="preset-btn"
                style="background: #ff8800"
                data-color="#ff8800"
              ></button>
              <button
                class="preset-btn"
                style="background: #8800ff"
                data-color="#8800ff"
              ></button>
              <button
                class="preset-btn"
                style="background: #00ff88"
                data-color="#00ff88"
              ></button>
              <button
                class="preset-btn"
                style="background: #880000"
                data-color="#880000"
              ></button>
            </div>
          </div>
          <div class="size-selector">
            <label class="picker-label">Size</label>
            <div class="size-options">
              <button class="size-btn active" data-size="512">512px</button>
              <button class="size-btn" data-size="256">256px</button>
              <button class="size-btn" data-size="128">128px</button>
              <button class="size-btn" data-size="64">64px</button>
            </div>
          </div>
        </div>
        <div class="color-modal-footer">
          <button class="download-btn" id="download-colored-png">
            Download PNG
          </button>
        </div>
      </div>
    </div>

    <!-- Web Component Modal -->
    <div class="wc-modal" id="wc-modal">
      <div class="wc-modal-backdrop"></div>
      <div class="wc-modal-content">
        <div class="wc-modal-header">
          <h3>Copy Component Code</h3>
          <button class="wc-modal-close" id="wc-modal-close">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6L6 18M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div class="wc-modal-body">
          <button class="wc-btn" data-framework="vue">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
            >
              <!-- Icon from Lineicons by Lineicons - https://github.com/LineiconsHQ/Lineicons/blob/main/LICENSE.md -->
              <path
                fill="currentColor"
                d="M17.4 3.442h-3.262l-2.126 3.543l-2.135-3.542l-2.369-.001H2l10.026 17.116L22 3.442zm-5.378 13.566L5.125 5.232h2.528l4.375 7.528l4.34-7.528h2.516z"
              />
            </svg>
            <span>Vue</span>
          </button>
          <button class="wc-btn" data-framework="vue-ts">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
            >
              <!-- Icon from Lineicons by Lineicons - https://github.com/LineiconsHQ/Lineicons/blob/main/LICENSE.md -->
              <path
                fill="currentColor"
                d="M17.4 3.442h-3.262l-2.126 3.543l-2.135-3.542l-2.369-.001H2l10.026 17.116L22 3.442zm-5.378 13.566L5.125 5.232h2.528l4.375 7.528l4.34-7.528h2.516z"
              />
            </svg>
            <span>Vue + TS</span>
          </button>
          <button class="wc-btn" data-framework="react">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
            >
              <!-- Icon from Lineicons by Lineicons - https://github.com/LineiconsHQ/Lineicons/blob/main/LICENSE.md -->
